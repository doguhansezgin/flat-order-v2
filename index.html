<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Flat Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>

<div class="wrap" id="app" style="display:none">
  <header>
    <span class="wordmark">FLAT</span>
    <span class="header-meta" id="header-meta"></span>
  </header>

  <main>
    <!-- KATALOG -->
    <div class="view" id="view-catalog">
      <div class="cats" id="cats"></div>
      <div class="search"><input id="search" placeholder="Ürün ara" autocomplete="off"></div>
      <div class="rows" id="catalog-rows"></div>
    </div>

    <!-- SEPET -->
    <div class="view" id="view-cart">
      <div id="cart-content"></div>
    </div>

    <!-- SİPARİŞLERİM -->
    <div class="view" id="view-orders">
      <div id="orders-content"></div>
    </div>
  </main>

  <div class="bar">
    <div class="bar-inner">
      <div class="bar-nav">
        <button id="nav-catalog" onclick="showView('catalog')">Ürünler</button>
        <button id="nav-cart" onclick="showView('cart')">Sepet</button>
        <button id="nav-orders" onclick="showView('orders')">Siparişler</button>
      </div>
      <button class="bar-cta" id="bar-cta" onclick="showView('cart')"></button>
    </div>
  </div>
</div>

<!-- GİRİŞ -->
<div class="wrap" id="auth-screen" style="display:none">
  <header><span class="wordmark">FLAT</span><span class="header-meta">Sipariş sistemi</span></header>
  <div class="auth">
    <div class="auth-tabs">
      <button id="tab-login" class="active" onclick="switchAuthTab('login')">Giriş</button>
      <button id="tab-register" onclick="switchAuthTab('register')">Kayıt</button>
    </div>

    <div id="login-form">
      <label class="lbl" for="login-email">E-posta</label>
      <input class="field" type="email" id="login-email" autocomplete="email">
      <label class="lbl" for="login-pw">Şifre</label>
      <input class="field" type="password" id="login-pw" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn-solid" onclick="doLogin()">Giriş yap</button>
      <div style="text-align:right;margin-top:14px"><button class="link" onclick="doForgotPassword()">Şifremi unuttum</button></div>
    </div>

    <div id="register-form" style="display:none">
      <label class="lbl" for="reg-cafe">Kafe / şube adı</label>
      <input class="field" id="reg-cafe">
      <label class="lbl" for="reg-name">Yetkili adı</label>
      <input class="field" id="reg-name">
      <label class="lbl" for="reg-phone">Telefon</label>
      <input class="field" type="tel" id="reg-phone" autocomplete="tel">
      <label class="lbl" for="reg-email">E-posta</label>
      <input class="field" type="email" id="reg-email" autocomplete="email">
      <label class="lbl" for="reg-pw">Şifre (en az 6 karakter)</label>
      <input class="field" type="password" id="reg-pw" autocomplete="new-password">
      <button class="btn-solid" onclick="doRegister()">Kayıt ol</button>
    </div>

    <div class="auth-err" id="auth-err"></div>
    <div class="auth-info" id="auth-info"></div>

    <div class="divider">veya</div>
    <button class="btn-google" onclick="doGoogleLogin()">
      <svg width="16" height="16" viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.17z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04c-.72.48-1.63.68-2.7.68-2.07 0-3.83-1.4-4.46-3.27H1.86v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.52 10.43A4.8 4.8 0 014.27 9c0-.5.09-.98.25-1.43V5.5H1.86A8 8 0 001 9c0 1.3.31 2.52.86 3.6l2.66-2.17z"/><path fill="#EA4335" d="M8.98 3.58c1.16 0 2.2.4 3.02 1.19l2.26-2.26A8 8 0 001.86 5.5L4.52 7.57c.63-1.87 2.39-3.99 4.46-3.99z"/></svg>
      Google ile devam et
    </button>
  </div>
</div>

<!-- ONAY BEKLİYOR -->
<div class="wrap" id="pending-screen" style="display:none">
  <header><span class="wordmark">FLAT</span></header>
  <div class="auth" style="text-align:center">
    <p class="eyebrow" style="margin-bottom:12px">Kayıt alındı</p>
    <p style="font-size:15px;line-height:1.7">Hesabınız onay bekliyor.<br>Onaylandıktan sonra tekrar deneyin.</p>
    <button class="btn-ghost" style="margin-top:28px" onclick="location.reload()">Tekrar kontrol et</button>
    <div style="margin-top:16px"><button class="link" onclick="doLogout()">Çıkış yap</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="js/app.js?v=6"></script>
</body>
</html>
